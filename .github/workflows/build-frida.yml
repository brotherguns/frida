name: Build and Sign Frida iOS (The Gospel)
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout the Heat
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app
          sudo xcodebuild -license accept
          xcode-select --print-path
          clang --version

      - name: Setup the Lab
        run: |
          brew install meson ninja pkg-config node
          pip3 install --break-system-packages colorama prompt-toolkit pygments websockets

      - name: Cache the SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: deps
          key: frida-sdk-ios-arm64-20260311

      - name: Build the SDK from Source
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          # ios-arm64 routes to env_apple.py which finds clang via Xcode
          python3 releng/deps.py build --bundle=sdk --host=ios-arm64

      - name: Cook the Binary
        run: |
          # FIX 1: ios-arm64 to match the SDK host above — arm64-apple-ios routed to
          # the wrong env module and failed to find the SDK in ./deps.
          #
          # FIX 2: Explicitly enable gadget — meson.options defaults to 'auto' which
          # can silently skip the gadget if cross-build detection is ambiguous.
          #
          # FIX 3: assets=embedded for jailed mode — no writable system prefix exists
          # on a stock device so all runtime assets must be bundled inside the dylib.
          ./configure --host=ios-arm64 \
            -- \
            -Dgadget=enabled \
            -Dfrida-core:assets=embedded

          make

      - name: Stash the Product
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-gadget-unsigned
          path: ${{ env.GADGET_PATH }}
