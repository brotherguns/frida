name: Build and Sign Frida iOS (The Gospel)
on:
  workflow_dispatch: # Manual trigger for when the block is hot
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-latest # Apple SDKs only live here
    timeout-minutes: 120 # SDK build from source takes a while

    steps:
      - name: Checkout the Heat
        uses: actions/checkout@v4
        with:
          submodules: recursive # Don't leave the subprojects in the cold

      - name: Setup the Lab
        run: |
          brew install meson ninja pkg-config node
          pip3 install --break-system-packages colorama prompt-toolkit pygments websockets

      - name: Import the Ice (P12 Certificate)
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install the Hall Pass (Provisioning Profile)
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "${{ secrets.PROVISION_BASE64 }}" | base64 -D > ~/Library/MobileDevice/Provisioning\ Profiles/signed.mobileprovision

      - name: Cache the SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: deps
          key: frida-sdk-apple-arm64-20260311

      - name: Build the SDK from Source
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          # No pre-built SDK on CDN for this toolchain version — build it ourselves.
          # This only runs on a cache miss, subsequent runs pull from cache.
          python3 releng/deps.py build --bundle=sdk --host=apple-arm64

      - name: Cook the Binary
        run: |
          # SDK tarball in ./deps gets picked up automatically by configure
          ./configure --host=arm64-apple-ios

          # This is a long cook. Let the stove sizzle.
          make

      - name: The Surgical Sign
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Development" | head -n 1 | awk -F '"' '{print $2}')

          if [ -z "$IDENTITY" ]; then
            echo "[-] COULD NOT FIND THE ICE. CHECK YOUR P12_BASE64."
            exit 1
          fi
          echo "[+] SIGNING WITH IDENTITY: $IDENTITY"

          TARGET_PATH=$(find build -name "frida-gadget.dylib" | head -n 1)

          if [ -z "$TARGET_PATH" ]; then
            echo "[-] BUILD FAILED. NO DYLIB FOUND. BUILD TREE:"
            find build -name "*.dylib" 2>/dev/null || echo "No dylibs found at all."
            exit 1
          fi

          echo "[+] FOUND GADGET AT: $TARGET_PATH"
          codesign -f -s "$IDENTITY" "$TARGET_PATH"
          echo "[+] GADGET SIGNED AND READY FOR THE STREETS."

          echo "GADGET_PATH=$TARGET_PATH" >> $GITHUB_ENV

      - name: Stash the Product
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-signed-gadget
          path: ${{ env.GADGET_PATH }}
